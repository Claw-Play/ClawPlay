name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm tsc --noEmit

      # Commit generated lockfile if it didn't exist before
      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git diff --staged --quiet || git commit -m "chore: generate pnpm-lock.yaml" && git push

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # CI-safe placeholder secrets — real values not needed for build
      JWT_SECRET: ci-dummy-jwt-secret-for-build-only
      CLAWPLAY_SECRET_KEY: ci-dummy-32-byte-secret-key-for-build-only
      UPSTASH_REDIS_REST_URL: https://fake-redis.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-dummy-token
      DATABASE_URL: ":memory:"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm build
